    - generic [ref=e29]:
      - heading "Who We Are" [level=2] [ref=e30]
      - paragraph [ref=e31]: Cinray Metal is a professional supplier of stainless steel raw materials, specializing in flat bars and wire ropes for global export markets. Founded with a commitment to quality and reliability, we bridge the gap between China's premier stainless steel manufacturers and international buyers seeking consistent, cost-effective material solutions.
      - paragraph [ref=e32]: Our core product lines include stainless steel flat bars (201, 304, 316, and 316L grades) and stainless steel wire ropes in various diameters and constructions. Each shipment undergoes rigorous quality inspection against ASTM and GB standards before dispatch, ensuring our customers receive materials that meet precise specifications every time.
      - paragraph [ref=e33]: With deep roots in China's stainless steel manufacturing hubs, we maintain strong partnerships with ISO-certified mills. This enables us to offer competitive factory-direct pricing while providing the responsive communication and logistics support that international trade demands. From sample requests to full container shipments, our dedicated team supports every step of the procurement process.
